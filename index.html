    ];
    return e("div",{style:{animation:"fadeUp 0.5s ease"}},
      e("div",{style:{marginBottom:36,maxWidth:680}},
        e("h1",{style:{fontSize:32,fontWeight:700,fontFamily:T.display,color:T.text,lineHeight:1.2,marginBottom:10,letterSpacing:"-0.02em"}},"Proposal & Resume Drafting"),

      ),

      e(Card,{style:{padding:28,marginBottom:20}},

        e("div",{style:{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"center",alignItems:"center",marginTop:12}},
          flowSteps.map((step,i)=>
            e(React.Fragment,{key:i},

                    e("div",{style:{fontSize:12,fontWeight:700,color:T.amber}},step.label),
                    e("div",{style:{fontSize:12,color:T.amber+"99"}},step.sub))
                : e("div",{style:{padding:"12px 16px",borderRadius:10,background:T.bg,border:"1.5px solid "+(step.color||T.border),textAlign:"center",minWidth:100}},

      e("svg",{width:W,height:H,viewBox:"0 0 "+W+" "+H,style:{display:"block"}},
        e("rect",{width:W,height:H,fill:T.surfaceAlt,rx:12}),
        actors.map(a=>e("g",{key:a.id},
          e("rect",{x:a.x-52,y:14,width:104,height:44,rx:8,fill:a.color+"10",stroke:a.color+"35",strokeWidth:1.5}),
          e("text",{x:a.x,y:32,textAnchor:"middle",fill:a.color,fontSize:11,fontWeight:700,fontFamily:T.sans},a.label),
          e("text",{x:a.x,y:48,textAnchor:"middle",fill:T.textTertiary,fontSize:9,fontWeight:500,fontFamily:T.sans},a.sub),
          e("line",{x1:a.x,y1:62,x2:a.x,y2:H-12,stroke:a.color+"20",strokeWidth:1.5,strokeDasharray:"4 4"})
        )),
        steps.map((s,i)=>{
          const isHov = seqHover === (seqWorkflow+"-"+i);
          const hovKey = seqWorkflow+"-"+i;
          const fa = actors.find(a=>a.id===s.from);
          const ta = s.type==="self" ? fa : actors.find(a=>a.id===s.to);
          const x1=fa.x, x2=ta.x;
          if(s.type==="self") {
            return e("g",{key:i,onMouseEnter:()=>setSeqHover(hovKey),onMouseLeave:()=>setSeqHover(null),style:{cursor:"pointer"}},
              e("path",{d:"M"+(x1+3)+" "+s.y+" h28 v16 h-28",fill:"none",stroke:s.color||fa.color,strokeWidth:1.5}),
              e("polygon",{points:(x1+3)+" "+(s.y+12)+" "+(x1+3)+" "+(s.y+20)+" "+(x1-3)+" "+(s.y+16),fill:s.color||fa.color}),
              e("text",{x:x1+38,y:s.y+5,fill:isHov?(s.color||fa.color):T.textSecondary,fontSize:10,fontWeight:isHov?700:500,fontFamily:T.mono,style:{transition:"fill 0.15s"}},s.label),
              s.note && isHov ? e("g",null,

                e("text",{x:x1+38,y:s.y+33,fill:"#FFF",fontSize:9,fontFamily:T.sans},s.note)) : null);
          }
          const goRight = x2 > x1, midX = (x1+x2)/2;
          return e("g",{key:i,onMouseEnter:()=>setSeqHover(hovKey),onMouseLeave:()=>setSeqHover(null),style:{cursor:"pointer"}},
            isHov ? e("rect",{x:Math.min(x1,x2)-2,y:s.y-13,width:Math.abs(x2-x1)+4,height:20,rx:3,fill:(s.color||fa.color)+"08"}) : null,
            e("line",{x1:x1+(goRight?4:-4),y1:s.y,x2:x2+(goRight?-6:6),y2:s.y,stroke:s.color||fa.color,strokeWidth:s.highlight?2:1.3,strokeDasharray:s.dashed?"5 3":"none",opacity:isHov?1:0.65,style:{transition:"opacity 0.15s"}}),
            e("polygon",{points:goRight?(x2-6)+","+(s.y-3.5)+" "+x2+","+s.y+" "+(x2-6)+","+(s.y+3.5):(x2+6)+","+(s.y-3.5)+" "+x2+","+s.y+" "+(x2+6)+","+(s.y+3.5),fill:s.color||fa.color,opacity:isHov?1:0.65}),

            s.note && isHov ? e("g",null,
              e("rect",{x:midX-Math.min(s.note.length*2.6+8,210),y:s.y+6,width:Math.min(s.note.length*5.2+16,420),height:20,rx:4,fill:T.text+"E8"}),

      ];
      function nd(id){return nodes.find(n=>n.id===id);}

      // Edge-to-edge arrow: connects specific sides of nodes
      // side: "bottom","top","left","right"
      function edgePoint(n, side, offset) {
        const o = offset||0;
        if(side==="bottom") return {x:n.x+o, y:n.y+n.h/2};
        if(side==="top")    return {x:n.x+o, y:n.y-n.h/2};
        if(side==="left")   return {x:n.x-n.w/2, y:n.y+o};
        if(side==="right")  return {x:n.x+n.w/2, y:n.y+o};
        return {x:n.x,y:n.y};
      }

      function arrowHead(x, y, dir, color) {
        const s=5;
        if(dir==="down")  return e("polygon",{points:(x-s)+","+(y-s*1.2)+" "+x+","+y+" "+(x+s)+","+(y-s*1.2),fill:color,opacity:0.6});
        if(dir==="up")    return e("polygon",{points:(x-s)+","+(y+s*1.2)+" "+x+","+y+" "+(x+s)+","+(y+s*1.2),fill:color,opacity:0.6});

        if(dir==="right") return e("polygon",{points:(x-s*1.2)+","+(y-s)+" "+x+","+y+" "+(x-s*1.2)+","+(y+s),fill:color,opacity:0.6});
      }

      // All connections defined declaratively
      const connections = [
        // PM → SharePoint (straight down)
        {from:"pm",fromSide:"bottom",to:"sp",toSide:"top",label:"Uploads RFPs + trigger files",color:T.text,style:"solid"},
        // SharePoint → n8n (left channel down)
        {from:"sp",fromSide:"bottom",fromOff:-35,to:"make",toSide:"top",toOff:-35,label:"Triggers scenarios",color:T.teal,style:"solid"},
        // n8n → SharePoint (right channel up — response)
        {from:"make",fromSide:"top",fromOff:35,to:"sp",toSide:"bottom",toOff:35,label:"Writes outputs back",color:T.green,style:"dashed"},
        // n8n → Claude
        {from:"make",fromSide:"bottom",fromOff:-60,to:"claude",toSide:"top",label:"Structured JSON request",color:T.purple,style:"solid"},
        // Claude → n8n (response)
        {from:"claude",fromSide:"top",fromOff:20,to:"make",toSide:"bottom",toOff:-40,label:"JSON response",color:T.purple,style:"dashed"},
        // n8n → Plumsail
        {from:"make",fromSide:"bottom",fromOff:-20,to:"plum",toSide:"top",label:"Merge DOCX",color:T.green,style:"solid"},
        // Plumsail → SharePoint (response path up-left)
        {from:"plum",fromSide:"left",to:"sp",toSide:"left",label:"Merged DOCX",color:T.green,style:"dashed",curveLeft:true},
        // n8n → CloudConvert
        {from:"make",fromSide:"bottom",fromOff:30,to:"cc",toSide:"top",label:"Convert files",color:T.orange,style:"solid"},
        // n8n → Teams
        {from:"make",fromSide:"bottom",fromOff:70,to:"teams",toSide:"top",label:"Notify team",color:T.purple,style:"solid"},
      ];

      return e("div",{style:{overflowX:"auto"}},
        e("svg",{width:W,height:H,viewBox:"0 0 "+W+" "+H,style:{display:"block"}},
          e("rect",{width:W,height:H,fill:"#FAFBFD",rx:12}),

          // Draw connections first (behind nodes)
          connections.map((c,i)=>{
            const f=nd(c.from), t=nd(c.to);
            const p1=edgePoint(f,c.fromSide,c.fromOff);
            const p2=edgePoint(t,c.toSide,c.toOff);
            const isDashed = c.style==="dashed";
            const col = c.color;

            // Determine arrow direction at endpoint
            const arrowDir = c.toSide==="top"?"down":c.toSide==="bottom"?"up":c.toSide==="left"?"right":"left";

            // Special curved path for Plumsail → SharePoint
            if(c.curveLeft) {
              const cx = Math.min(p1.x, p2.x) - 60;
              return e("g",{key:i},
                e("path",{d:"M"+p1.x+" "+p1.y+" C"+cx+" "+p1.y+" "+cx+" "+p2.y+" "+p2.x+" "+p2.y,
